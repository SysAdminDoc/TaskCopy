name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    name: Build Release (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TaskCopy.sln

      - name: Build
        run: dotnet build TaskCopy.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test TaskCopy.sln -c Release --no-build --no-restore
